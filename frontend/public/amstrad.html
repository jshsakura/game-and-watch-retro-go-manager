<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Amstrad CPC</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #game { width: 100%; height: 100%; }
    .msg { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
           color: #ccc; font-family: sans-serif; font-size: 14px; text-align: center; padding: 12px; }
  </style>
</head>
<body>
  <div class="msg" id="msg">불러오는 중…</div>
  <div id="game"></div>
  <script>
    /* NOTE: "peek only" runner. The self-hosted cap32 core boots the Amstrad (BASIC
       prompt) but ABORTS the moment it mounts a real .dsk (RuntimeError: unreachable
       — reproduced across every cap32 wasm build we tried). So we intentionally let
       EmulatorJS load the disk its default way: cap32 can't read that wrapper, leaves
       drive A empty, and lands at the Amstrad BASIC screen WITHOUT crashing. That's
       the "open it up and see the machine" level the feature is scoped to — the game
       itself does not load. Do NOT add EJS_disableCue / m3u tricks here: forcing a
       real disk mount is exactly what triggers the abort. */

    /* resume suspended AudioContext on first gesture (autoplay policy) */
    (function () {
      var ctxs = [];
      ["AudioContext", "webkitAudioContext"].forEach(function (n) {
        var Orig = window[n]; if (!Orig) return;
        function W(o) { var c = o ? new Orig(o) : new Orig(); ctxs.push(c); return c; }
        W.prototype = Orig.prototype; window[n] = W;
      });
      function unlock() {
        ctxs.forEach(function (c) { try { if (c.state === "suspended") c.resume(); } catch (e) {} });
      }
      ["pointerdown", "touchend", "mousedown", "keydown", "click"].forEach(function (ev) {
        window.addEventListener(ev, unlock, true);
      });
    })();

    var msg = document.getElementById("msg");
    var romId = new URLSearchParams(location.search).get("rom");

    // Virtual-pad input from the parent overlay → EmulatorJS via simulateInput.
    // RetroPad indices: B=0, Select=2, Start=3, Up=4, Down=5, Left=6, Right=7, A=8.
    var IDX = { up: 4, down: 5, left: 6, right: 7, a: 8, b: 0, start: 3, select: 2 };
    window.addEventListener("message", function (e) {
      var d = e.data;
      if (!d || d.type !== "ejs-input" || !(d.btn in IDX)) return;
      try { window.EJS_emulator.gameManager.simulateInput(0, IDX[d.btn], d.down ? 1 : 0); }
      catch (err) { /* not started yet */ }
    });

    if (!romId) { msg.textContent = "ROM이 지정되지 않았습니다."; }
    else {
      fetch("/api/sessions/public/roms/" + encodeURIComponent(romId) + "/rom")
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.blob(); })
        .then(function (blob) {
          window.EJS_player = "#game";
          window.EJS_core = "cap32";                 // Caprice32 (Amstrad CPC). EmulatorJS
          // 4.2.3 has no "amstrad" alias; passing the core name directly works via the
          // getCore() fallback and loads cores/cap32-*-wasm.data.
          window.EJS_pathtodata = "/emulatorjs/data/";   // self-hosted, no external CDN
          window.EJS_gameUrl = URL.createObjectURL(blob);
          window.EJS_gameName = "game.dsk";
          window.EJS_startOnLoaded = true;
          window.EJS_disableDatabases = true;        // no external game-info DB calls
          window.EJS_volume = 0.5;
          window.EJS_onGameStart = function () { if (msg) msg.remove(); };
          var s = document.createElement("script");
          s.src = "/emulatorjs/data/loader.js";
          s.onerror = function () { msg.textContent = "EmulatorJS 로드 실패"; };
          document.body.appendChild(s);
        })
        .catch(function (e) { msg.textContent = "ROM 가져오기 실패 (" + e.message + ")"; });
    }
  </script>
</body>
</html>
